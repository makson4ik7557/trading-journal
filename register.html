<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Trading Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
<div class="auth-page">
    <div class="auth-page__form-side">
        <div class="auth-form">
            <div class="auth-form__logo">⊜ Journal</div>
            <h1 class="auth-form__title">Create account</h1>
            <p class="auth-form__subtitle">Start tracking your trades today</p>

            <div class="auth-form__fields">
                <div class="input-group">
                    <label class="input-group__label">Name</label>
                    <input class="input" type="text" placeholder="John Smith">
                </div>
                <div class="input-group">
                    <label class="input-group__label">Email</label>
                    <input class="input" type="email" placeholder="johnsmith@example.com">
                </div>
                <div class="input-group">
                    <label class="input-group__label">Password</label>
                    <input class="input" type="password" placeholder="At least 6 characters">
                </div>
            </div>

            <button class="btn btn--primary btn--block">Create account</button>
            <div class="auth-form__footer">
                Already have an account? <a href="login.html">Log in</a>
            </div>
        </div>
    </div>

    <div class="auth-page__art-side">
        <div class="auth-page__art">

            <h2 class="auth-page__art-title">Trade smarter, not harder</h2>
            <p class="auth-page__art-text">
                Log every trade. Spot patterns in your wins and losses.
                Become the trader you want to be.
            </p>

            <div class="auth-page__art-quote">
                "What gets measured gets managed."
            </div>

        </div>
    </div>
</div>

</body>
</html>
