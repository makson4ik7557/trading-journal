<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Trading Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
<div class="auth-page">
    <div class="auth-page__form-side">
        <form id="register-form" class="auth-form" novalidate>
            <div class="auth-form__logo">⊜ Journal</div>
            <h1 class="auth-form__title">Create account</h1>
            <p class="auth-form__subtitle">Start tracking your trades today</p>

            <div class="auth-form__fields">
                <div class="input-group">
                    <label class="input-group__label" for="name">Name</label>
                    <input id="name" class="input" type="text" placeholder="John Smith" required>
                </div>
                <div class="input-group">
                    <label class="input-group__label" for="email">Email</label>
                    <input id="email" class="input" type="email" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label class="input-group__label" for="password">Password</label>
                    <input id="password" class="input" type="password" placeholder="At least 6 characters" required>
                </div>
            </div>

            <button id="register-submit" type="submit" class="btn btn--primary btn--block">Create account</button>

            <div id="register-error" style="color:var(--loss); margin-top:12px; font-size:13px; min-height:18px;"></div>

            <div class="auth-form__footer">
                Already have an account? <a href="login.html">Log in</a>
            </div>
        </form>
    </div>

    <div class="auth-page__art-side">
        <div class="auth-page__art">
            <h2 class="auth-page__art-title">Trade smarter, not harder</h2>
            <p class="auth-page__art-text">
                Log every trade. Spot patterns in your wins and losses.
                Become the trader you want to be.
            </p>
            <div class="auth-page__art-quote">
                "What gets measured gets managed."
            </div>
        </div>
    </div>
</div>

<script type="module" src="js/pages/register.js"></script>
</body>
</html>
