<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Trades — Trading Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

<div class="app-shell">

    <aside class="sidebar">
        <div class="sidebar__logo">⊜ Journal</div>

        <nav class="sidebar__nav">
            <div class="sidebar__section-title">Trading</div>
            <a href="dashboard.html" class="sidebar__link">Dashboard</a>
            <a href="trades.html" class="sidebar__link sidebar__link--active">My Trades</a>
            <a href="assets.html" class="sidebar__link">Assets</a>
        </nav>

        <nav class="sidebar__nav" data-admin-only>
            <div class="sidebar__section-title">Admin</div>
            <a href="users.html" class="sidebar__link">Users</a>
        </nav>

        <nav class="sidebar__nav" style="margin-top: auto;">
            <a href="#" class="sidebar__link" data-logout>Logout</a>
        </nav>
    </aside>

    <header class="header">
        <div class="header__title">My Trades</div>
        <div class="header__actions">
            <div class="header__user">
                <div class="header__avatar" data-user-avatar>?</div>
                <span data-user-name>—</span>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="container">

            <div class="page-header">
                <div>
                    <h1 class="page-header__title">My Trades</h1>
                    <p class="page-header__subtitle">All your logged positions in one place</p>
                </div>
            </div>

            <div class="filters">
                <div class="filters__group">
                    <label class="filters__label" for="filter-asset">Asset</label>
                    <select id="filter-asset" class="select">
                        <option value="">All assets</option>
                    </select>
                </div>

                <div class="filters__group">
                    <label class="filters__label" for="filter-side">Side</label>
                    <select id="filter-side" class="select">
                        <option value="">All sides</option>
                        <option value="buy">Buy</option>
                        <option value="sell">Sell</option>
                    </select>
                </div>

                <div class="filters__group">
                    <label class="filters__label" for="filter-status">Status</label>
                    <select id="filter-status" class="select">
                        <option value="">All</option>
                        <option value="open">Open</option>
                        <option value="closed">Closed</option>
                    </select>
                </div>

                <div class="filters__group">
                    <label class="filters__label" for="filter-from">From</label>
                    <input id="filter-from" class="input" type="date">
                </div>

                <div class="filters__group">
                    <label class="filters__label" for="filter-to">To</label>
                    <input id="filter-to" class="input" type="date">
                </div>

                <div class="filters__actions">
                    <button id="filter-reset" class="btn btn--ghost btn--sm">Reset</button>
                    <button id="filter-apply" class="btn btn--secondary btn--sm">Apply</button>
                </div>
            </div>

            <div class="table-wrapper">
                <table class="table">
                    <thead>
                    <tr>
                        <th>Asset</th>
                        <th>Side</th>
                        <th class="table__num">Entry</th>
                        <th class="table__num">Exit</th>
                        <th class="table__num">Qty</th>
                        <th class="table__num">P&L</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody data-trades-tbody>
                    <tr><td colspan="9" style="text-align:center; padding:24px;">Loading…</td></tr>
                    </tbody>
                </table>
            </div>

        </div>
    </main>

</div>

<script type="module" src="js/pages/trades.js"></script>
</body>
</html>
